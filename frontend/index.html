<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UK Crime-Rate Heatmap</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗺️</text></svg>">
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="map"></div>

<nav id="breadcrumb" aria-label="Drill-down path"></nav>

<div id="legend"></div>

<div id="status" hidden></div>

<button id="about-btn" title="About this map">i</button>

<aside id="panel" class="hidden" aria-label="Region dashboard">
  <div id="panel-content"></div>
</aside>

<div id="about" class="hidden">
  <div id="about-card">
    <button class="close" data-close="about">&times;</button>
    <h2>About this map</h2>
    <div id="about-body"></div>
  </div>
</div>

<div id="boot-error" hidden></div>

<script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/legend.js"></script>
<script src="js/refresh.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/map.js"></script>
<script src="js/app.js"></script>
</body>
</html>
